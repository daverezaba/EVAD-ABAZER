<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Stickman Z - Galaxy Brawler</title>
<style>
  body { margin:0; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; color:white; }
  canvas { display:block; margin:0 auto; border: 4px solid #333; box-shadow: 0 0 50px rgba(0,247,255,0.2); }
  
  /* Instruction Button Styles */
  #ui-layer { position: absolute; top: 20px; width: 100%; pointer-events: none; }
  #howToBtn { 
    pointer-events: auto;
    position: absolute; 
    top: 10px; 
    left: 50%; 
    transform: translateX(-50%);
    background: rgba(0, 247, 255, 0.2);
    border: 2px solid #00f7ff;
    color: #fff;
    padding: 8px 15px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
    transition: 0.3s;
    z-index: 100;
  }
  #howToBtn:hover { background: rgba(0, 247, 255, 0.5); box-shadow: 0 0 15px #00f7ff; }

  /* Instruction Modal */
  #modal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 30, 0.95);
    border: 3px solid #00f7ff;
    padding: 30px;
    border-radius: 15px;
    z-index: 200;
    text-align: center;
    box-shadow: 0 0 100px #000;
  }
</style>
</head>
<body>

<div id="ui-layer">
    <button id="howToBtn" onclick="toggleInstructions()">INSTRUCTIONS</button>
</div>

<div id="modal">
    <h2 style="color:#00f7ff; margin-top:0;">GALAXY CONTROLS</h2>
    <div style="display:flex; gap:40px; text-align:left;">
        <div>
            <h3 style="color:#00f7ff;">Player 1</h3>
            <p>Move: <b>W, A, D</b></p>
            <p>Punch: <b>F</b></p>
            <p>Kick: <b>G</b></p>
            <p>Special: <b>H</b></p>
        </div>
        <div style="border-left: 1px solid #333; padding-left:40px;">
            <h3 style="color:#ff8000;">Player 2</h3>
            <p>Move: <b>Arrows</b></p>
            <p>Punch: <b>K</b></p>
            <p>Kick: <b>L</b></p>
            <p>Special: <b>;</b></p>
        </div>
    </div>
    <button id="howToBtn" style="position:static; transform:none; margin-top:20px;" onclick="toggleInstructions()">CLOSE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 1000;
canvas.height = 500;

const gravity = 0.6;
const friction = 0.8;
const groundLevel = canvas.height - 60;

let gameState = "start";
const popups = [];
const keys = {};

function toggleInstructions() {
    const modal = document.getElementById('modal');
    modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
}

// Galaxy Background Logic
const stars = [];
for(let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.1,
        opacity: Math.random()
    });
}

function drawGalaxy() {
    let spaceGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 600);
    spaceGrad.addColorStop(0, "#1a1a2e");
    spaceGrad.addColorStop(1, "#000");
    ctx.fillStyle = spaceGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalAlpha = 0.2;
    ctx.fillStyle = "#4834d4";
    ctx.beginPath();
    ctx.arc(canvas.width * 0.3, canvas.height * 0.4, 200 + Math.sin(Date.now()*0.001)*20, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = "white";
    stars.forEach(s => {
        s.x -= s.speed;
        if(s.x < 0) s.x = canvas.width;
        ctx.globalAlpha = s.opacity;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1.0;
}

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Player {
  constructor(x, color, controls, name) {
    this.name = name;
    this.x = x;
    this.y = groundLevel;
    this.vx = 0;
    this.vy = 0;
    this.color = color;
    this.controls = controls;
    this.health = 100;
    this.displayHealth = 100; // Used for smooth bar animation
    this.facing = 1;
    this.attackTimer = 0;
    this.attackType = ""; 
    this.specialCooldown = 0;
    this.animTime = 0;
    this.dead = false;
    this.ragdoll = [];
  }

  update(opponent) {
    if (this.dead) { this.updateRagdoll(); return; }

    this.animTime += 0.15;
    if (this.attackTimer > 0) this.attackTimer--;
    if (this.specialCooldown > 0) this.specialCooldown--;

    // Smooth Health Transition Logic
    if (this.displayHealth > this.health) {
        this.displayHealth -= 0.5;
    }

    if (this.attackTimer <= 10) {
      if (keys[this.controls.left]) this.vx -= 1.0;
      if (keys[this.controls.right]) this.vx += 1.0;
      if (keys[this.controls.jump] && this.y >= groundLevel) this.vy = -15;
    }

    this.vx *= friction;
    this.vy += gravity;
    this.x += this.vx;
    this.y += this.vy;

    if (this.y > groundLevel) { this.y = groundLevel; this.vy = 0; }
    this.x = Math.max(30, Math.min(canvas.width - 30, this.x));
    if (this.attackType !== "special") this.facing = opponent.x > this.x ? 1 : -1;

    if (this.attackTimer <= 0) {
      if (keys[this.controls.punch]) this.attack(opponent, "punch", 8, 15);
      if (keys[this.controls.kick]) this.attack(opponent, "kick", 12, 25);
      if (keys[this.controls.special] && this.specialCooldown <= 0) {
        this.attack(opponent, "special", 35, 60);
        this.specialCooldown = 400;
      }
    }
  }

  attack(opponent, type, dmg, duration) {
    this.attackType = type;
    this.attackTimer = duration;
    if (type === "special") {
        const startY = this.y - 45;
        if (Math.abs(opponent.x - this.x) < 650 && this.facing === (opponent.x > this.x ? 1 : -1)) {
            if (opponent.y > startY - 60 && opponent.y < startY + 60) opponent.takeHit(dmg, this.facing * 50);
        }
    } else {
        let hitbox = { x: this.x + (this.facing * 40), y: type === "punch" ? this.y - 60 : this.y - 30, w: 45, h: 40 };
        if (hitbox.x < opponent.x + 30 && hitbox.x + hitbox.w > opponent.x - 30 &&
            hitbox.y < opponent.y && hitbox.y + hitbox.h > opponent.y - 80) {
            opponent.takeHit(dmg, this.facing * (type === "kick" ? 30 : 15));
        }
    }
  }

  takeHit(dmg, force) {
    this.health -= dmg;
    this.vx += force * 0.15;
    this.vy = -6;
    popups.push(new Popup(this.x, this.y - 120, "-" + dmg, this.color));
    if (this.health <= 0) this.die(force);
  }

  die(force) {
    this.dead = true;
    for (let i = 0; i < 8; i++) {
      this.ragdoll.push({ x: this.x, y: this.y - i * 10, vx: (Math.random()-0.5)*8 + force*0.2, vy: -Math.random()*15 });
    }
  }

  updateRagdoll() {
    this.ragdoll.forEach(p => {
      p.vy += gravity; p.x += p.vx; p.y += p.vy;
      if (p.y > groundLevel) { p.y = groundLevel; p.vy *= -0.4; p.vx *= 0.8; }
    });
  }

  draw() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 7;
    ctx.lineCap = "round";

    if (this.dead) {
      this.ragdoll.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill();
      });
      return;
    }

    const headY = this.y - 80;
    const bodyCenterY = this.y - 45;
    const isAttacking = this.attackTimer > 0;

    if (isAttacking && this.attackType === "special") {
        ctx.save();
        ctx.shadowBlur = 30; ctx.shadowColor = "white";
        let grad = ctx.createLinearGradient(this.x, headY, this.x + (this.facing * 700), headY);
        grad.addColorStop(0, "white"); grad.addColorStop(0.2, this.color); grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        let pulse = Math.sin(Date.now()*0.02) * 15;
        ctx.beginPath(); ctx.ellipse(this.x + (this.facing * 350), bodyCenterY, 350, 30 + pulse, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    ctx.fillStyle = this.color;
    for (let i = 0; i < 5; i++) {
        let hAngle = (i / 5) * Math.PI - Math.PI/2;
        let jitter = Math.sin(this.animTime * 4 + i) * 6;
        ctx.beginPath();
        ctx.moveTo(this.x + Math.cos(hAngle) * 10, headY - 5);
        ctx.lineTo(this.x + Math.cos(hAngle) * 30, headY - 35 + jitter);
        ctx.lineTo(this.x + Math.cos(hAngle + 0.5) * 10, headY - 5);
        ctx.fill();
    }

    ctx.beginPath(); ctx.arc(this.x, headY, 14, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(this.x, headY + 14); ctx.lineTo(this.x, bodyCenterY + 15); ctx.stroke();

    const shoulderY = headY + 25;
    if (isAttacking && this.attackType === "punch") {
        ctx.beginPath(); ctx.moveTo(this.x, shoulderY);
        ctx.lineTo(this.x + (this.facing * 60), shoulderY); ctx.stroke();
    } else if (isAttacking && this.attackType === "special") {
        ctx.beginPath(); ctx.moveTo(this.x, shoulderY);
        ctx.lineTo(this.x + (this.facing * 40), bodyCenterY); ctx.stroke();
    } else {
        let armMotion = Math.sin(this.animTime) * 3;
        ctx.beginPath(); ctx.moveTo(this.x, shoulderY); ctx.lineTo(this.x + (this.facing * 20), shoulderY + 15 + armMotion); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.x, shoulderY); ctx.lineTo(this.x - (this.facing * 15), shoulderY + 20); ctx.stroke();
    }

    const hipY = bodyCenterY + 15;
    if (isAttacking && this.attackType === "kick") {
        ctx.beginPath(); ctx.moveTo(this.x, hipY); ctx.lineTo(this.x + (this.facing * 60), hipY + 20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.x, hipY); ctx.lineTo(this.x - (this.facing * 10), this.y); ctx.stroke();
    } else {
        let isMoving = Math.abs(this.vx) > 0.5;
        let walk = isMoving ? Math.sin(this.animTime * 2) * 15 : 12;
        ctx.beginPath(); ctx.moveTo(this.x, hipY); ctx.lineTo(this.x + walk, this.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.x, hipY); ctx.lineTo(this.x - walk, this.y); ctx.stroke();
    }
  }
}

class Popup {
  constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 60; }
  update() { this.y -= 1.5; this.life--; }
  draw() { ctx.globalAlpha = this.life / 60; ctx.fillStyle = this.color; ctx.font = "bold 28px Arial"; ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = 1; }
}

const p1 = new Player(200, "#00f7ff", { left: "a", right: "d", jump: "w", punch: "f", kick: "g", special: "h" }, "CYAN SAIYAN");
const p2 = new Player(800, "#ff8000", { left: "arrowleft", right: "arrowright", jump: "arrowup", punch: "k", kick: "l", special: ";" }, "GOLDEN BRAWLER");

function drawUI() {
    const drawAnimatedBar = (x, y, health, displayHealth, color, rightAlign) => {
        ctx.fillStyle = "#222";
        ctx.fillRect(x, y, 300, 30);
        
        // Ghost bar (white bar that trails behind)
        ctx.fillStyle = "white";
        if(rightAlign) ctx.fillRect(x + (300 - displayHealth * 3), y, displayHealth * 3, 30);
        else ctx.fillRect(x, y, displayHealth * 3, 30);

        // Actual health bar
        ctx.fillStyle = color;
        if(rightAlign) ctx.fillRect(x + (300 - health * 3), y, health * 3, 30);
        else ctx.fillRect(x, y, health * 3, 30);

        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, 300, 30);
    };

    drawAnimatedBar(40, 40, p1.health, p1.displayHealth, p1.color, false);
    drawAnimatedBar(canvas.width - 340, 40, p2.health, p2.displayHealth, p2.color, true);

    // Special Cooldown Dots
    ctx.fillStyle = p1.specialCooldown <= 0 ? p1.color : "#444";
    ctx.beginPath(); ctx.arc(40, 85, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p2.specialCooldown <= 0 ? p2.color : "#444";
    ctx.beginPath(); ctx.arc(canvas.width - 40, 85, 10, 0, Math.PI*2); ctx.fill();
}

function gameLoop() {
  drawGalaxy();

  if (gameState === "start") {
    ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 70px Arial";
    ctx.shadowBlur = 20; ctx.shadowColor = "cyan";
    ctx.fillText("GALAXY BRAWLER Z", canvas.width/2, 200);
    ctx.shadowBlur = 0; ctx.font = "24px Arial";
    ctx.fillText("PRESS ENTER TO START", canvas.width/2, 270);
    if (keys["enter"]) gameState = "play";
  }

  else if (gameState === "play") {
    p1.update(p2); p2.update(p1);
    p1.draw(); p2.draw();
    drawUI();
    popups.forEach((p, i) => { p.update(); p.draw(); if(p.life <=0) popups.splice(i, 1); });
    if (p1.health <= 0 || p2.health <= 0) gameState = "gameover";
  }

  else if (gameState === "gameover") {
    ctx.textAlign = "center";
    ctx.fillStyle = p1.health > 0 ? p1.color : p2.color;
    ctx.font = "bold 60px Arial";
    ctx.fillText((p1.health > 0 ? "PLAYER 1" : "PLAYER 2") + " VICTORIOUS", canvas.width/2, 200);
    ctx.fillStyle = "white"; ctx.font = "24px Arial";
    ctx.fillText("PRESS R TO RESTART", canvas.width/2, 270);
    if (keys["r"]) location.reload();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
